services:
  telbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: telbot
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=stage
      - APP_DEBUG=false
      - CADDY_HTTP_PORT=8080
      - CADDY_HTTP_PORT_2=8081
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./storage:/app/storage
      - ./.env:/app/.env:ro
    restart: always
